version = 0.1

[default.global.parameters]
stack_name = "north-star"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
# Fill AllowedOrigin after the Vercel deployment exists. Leave it blank for the
# first deploy, then redeploy with the real origin.
parameter_overrides = "BedrockModelId=\"amazon.nova-lite-v1:0\" LocalOrigin=\"http://localhost:3000\" LogLevel=\"info\""

[default.validate.parameters]
lint = true
